# Root Directory = "." (repo root)
[build]
builder = "nixpacks"
nixpacksConfigPath = "apps/worker/nixpacks.toml"
buildCommand = "pnpm install --frozen-lockfile && pnpm turbo run build --filter=@loyalty/worker"

[deploy]
startCommand = "node apps/worker/dist/main"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
