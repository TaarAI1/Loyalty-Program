[build]
builder = "nixpacks"

[deploy]
# prestart in package.json also runs migrate-deploy.js when Railway uses pnpm/npm start
releaseCommand = "node scripts/migrate-deploy.js"
startCommand = "pnpm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
