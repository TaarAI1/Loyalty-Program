# Railway API service — set Root Directory to "." (repo root), NOT apps/api
[build]
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile && pnpm turbo run build --filter=@loyalty/api"

[deploy]
startCommand = "node apps/api/start.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
