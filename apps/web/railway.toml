# Root Directory = "/" | Config file = apps/web/railway.toml
[build]
builder = "nixpacks"
nixpacksConfigPath = "apps/web/nixpacks.toml"
buildCommand = "pnpm install --frozen-lockfile && pnpm turbo run build --filter=@loyalty/web"

[deploy]
startCommand = "pnpm --filter @loyalty/web start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
